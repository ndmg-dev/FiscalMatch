version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fiscalmatch_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fiscalmatch}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fiscalmatch_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2023-09-07T02-05-02Z
    container_name: fiscalmatch_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ./backend
    container_name: fiscalmatch_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fiscalmatch
      - MINIO_ENDPOINT=minio:9000
      - SIEG_API_KEY=${SIEG_API_KEY}
      - SIEG_EMAIL=${SIEG_EMAIL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ./backend
    container_name: fiscalmatch_worker
    command: ["python", "worker.py"]
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/fiscalmatch}
      - MINIO_ENDPOINT=minio:9000
      - SIEG_API_KEY=${SIEG_API_KEY}
      - SIEG_EMAIL=${SIEG_EMAIL}
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
    container_name: fiscalmatch_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
